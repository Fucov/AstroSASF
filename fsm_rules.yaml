# ============================================================================ #
#  AstroSASF — V5 联锁规则配置                                                   #
#  正交子系统状态 + 跨系统联锁规则（应用层定义，框架加载）                            #
# ============================================================================ #

# 子系统定义：每个子系统独立维护自己的状态空间
subsystems:
  thermal: [IDLE, HEATING, COOLING]
  vacuum:  [IDLE, ACTIVE]
  arm:     [IDLE, MOVING]

# 初始状态
initial_states:
  thermal: IDLE
  vacuum: IDLE
  arm: IDLE

# 联锁规则（跨子系统安全约束）
# condition: 安全求值布尔表达式（变量 = 子系统状态 + 遥测值）
# message: 拦截时的人类可读消息
# scope: 可选，仅对指定 tool 生效（省略 = 全局）
interlocks:
  # 真空激活时禁止移动机械臂
  - condition: "vacuum == 'ACTIVE' and arm == 'MOVING'"
    message: "联锁: 真空激活时禁止移动机械臂"

  # 机械臂运动中禁止启动加热
  - condition: "arm == 'MOVING' and thermal == 'HEATING'"
    message: "联锁: 机械臂运动中禁止启动加热"

  # 温度过高时全局禁止操作（遥测变量）
  - condition: "temperature >= 80"
    message: "联锁: 温度 >= 80℃，安全停机"

  # 低压下禁止移动机械臂（遥测变量 + scope 过滤）
  - condition: "pressure < 50"
    message: "联锁: 低压 (< 50 kPa) 下禁止移动机械臂"
    scope: move_robotic_arm
